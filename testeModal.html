<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="assets/css/cardsFisicoAssinaturas.css">
    <script src="assets/js/alternanciaPlanos.js" defer></script>


    <style>
        .modal-copa {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.65);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 20px;
        }

        .modal-copa-content {
            background: #ffffff;
            max-width: 420px;
            width: 100%;
            border-radius: 16px;
            padding: 28px 24px;
            text-align: center;
            position: relative;
            font-family: Arial, sans-serif;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
            animation: modalZoom 0.3s ease;
        }

        .modal-copa-content h2 {
            margin: 0 0 15px;
            color: #0b7a35;
            font-size: 24px;
        }

        .modal-copa-content p {
            color: #333;
            font-size: 16px;
            line-height: 1.5;
        }

        .modal-destaque {
            font-weight: bold;
            color: #0b7a35 !important;
        }

        .modal-btn {
            display: inline-block;
            margin-top: 15px;
            background: #0b7a35;
            color: #fff;
            padding: 12px 22px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
        }

        .modal-btn:hover {
            background: #095c29;
        }

        .modal-close {
            position: absolute;
            top: 10px;
            right: 14px;
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #555;
        }

        @keyframes modalZoom {
            from {
                transform: scale(0.85);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>

</head>

<body>


</body>
<script>
    window.addEventListener("load", function () {
        if (!localStorage.getItem("modalCopaVisto")) {
            document.getElementById("modalCopa").style.display = "flex";
        }
    });

    function fecharModalCopa() {
        document.getElementById("modalCopa").style.display = "none";
        localStorage.setItem("modalCopaVisto", "true");
    }
</script>

</html>
