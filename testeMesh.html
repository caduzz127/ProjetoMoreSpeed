<body>
    <!DOCTYPE html>
    <html lang="pt-br">

    <head>
        <meta charset="UTF-8">
        <title>Rede Mesh</title>
        <style>
            body {
                background: #0f172a;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
            }

            .container {
                position: relative;
                width: 600px;
                height: 200px;
                border: 2px solid #334155;
                border-radius: 12px;
            }

            .ap {
                position: absolute;
                width: 40px;
                height: 40px;
                background: #22c55e;
                border-radius: 50%;
                top: 80px;
            }

            #ap1 {
                left: 50px;
            }

            #ap2 {
                right: 50px;
            }

            .phone {
                position: absolute;
                width: 30px;
                height: 50px;
                background: #38bdf8;
                border-radius: 8px;
                top: 75px;
                left: 70px;
                transition: left 0.1s linear;
            }

            .signal {
                position: absolute;
                top: -25px;
                left: -10px;
                font-size: 20px;
            }
        </style>
    </head>

    <body>

        <div class="container">
            <div id="ap1" class="ap"></div>
            <div id="ap2" class="ap"></div>

            <div id="phone" class="phone">
                <div id="signal" class="signal">📶📶📶📶</div>
            </div>
        </div>

        <script>
            const phone = document.getElementById("phone");
            const signal = document.getElementById("signal");

            let pos = 70;
            let direction = 1;

            function update() {
                pos += direction * 2;

                if (pos > 500 || pos < 50) {
                    direction *= -1;
                }

                phone.style.left = pos + "px";

                // distância dos APs
                let dist1 = Math.abs(pos - 50);
                let dist2 = Math.abs(pos - 550);

                let dist = Math.min(dist1, dist2);

                // define sinal
                if (dist < 100) signal.textContent = "📶📶📶📶";
                else if (dist < 200) signal.textContent = "📶📶📶";
                else if (dist < 300) signal.textContent = "📶📶";
                else signal.textContent = "📶";

                requestAnimationFrame(update);
            }

            update();
        </script>

    </body>

    </html>
</body>

</html>
